<!--loads the static tag used to reference static files-->
{% load static %}

<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--{% static 'chota.css' %} is evaluated to static/custom.css by the django's template engine-->
    <link href="{% static 'chota.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'custom.css' %}" rel="stylesheet" type="text/css">
    <title>BlogMaker Lite</title>
</head>

<body>
    <nav class="nav">
        <div class="nav-left">
            <!--Adds a link back to the home page using the url template-->
            <a class="active" href="{% url 'blogs:index' %}">BlogMaker Lite</a>
            <a href="{% url 'blogs:blogs' %}">All blogs</a>
        </div>

        {% if user.is_authenticated %}
        <a href="{% url 'blogs:new_blog' %}">Create Blog</a>
        {% endif %}

        {% if user.is_authenticated %}
        <span class="is-vertical-align">Yokuzo, {{user.username}}</span>

        <form action="{% url 'accounts:logout' %}" class="is-vertical-align" method="post">
            {% csrf_token %}
            <button class="button outline"">Log Out</button></form>
            {% else %}
            <div class=" nav-right">
                <a class="active" href="{% url 'accounts:login' %}">Log In</a>
                <a class="active" href="{% url 'accounts:register' %}">Register</a>
                </div>
                {% endif %}
    </nav>
    <!-- Used to dynamically generate html in a webpage-->
    <div class="container">
        {% block content %}{% endblock content %}
    </div>
</body>

</html>
